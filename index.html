<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!--PAGE_TITLE-->Ford Service Manual<!--/PAGE_TITLE--></title>
<style>
  /* ── Fonts ── */
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  /* ── Variables ── */
  :root {
    --bg:        #0f0f10;
    --surface:   #18181b;
    --border:    #2a2a2f;
    --accent:    #e8531a;
    --accent2:   #f59e0b;
    --text:      #e4e4e7;
    --muted:     #71717a;
    --sidebar-w: 300px;
    --header-h:  48px;
    --mono:      'DM Mono', monospace;
    --sans:      'DM Sans', sans-serif;
    --display:   'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .logo span { color: var(--accent); }

  .search-wrap {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    padding: 6px 12px 6px 32px;
    outline: none;
    transition: border-color 0.15s;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 13px;
  }

  #search-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    max-height: 400px;
    overflow-y: auto;
    overflow-x: auto;
    z-index: 200;
    display: none;
  }

  #search-results.visible { display: block; }

  .search-result {
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .search-result:last-child { border-bottom: none; }
  .search-result:hover { background: var(--bg); }

  .result-title {
    font-weight: 500;
    font-size: 12px;
    color: var(--text);
  }

  .result-path {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 2px;
  }

  .result-type {
    display: inline-block;
    font-size: 9px;
    font-family: var(--mono);
    padding: 1px 5px;
    border-radius: 3px;
    margin-right: 6px;
    text-transform: uppercase;
  }

  .type-workshop { background: #1e3a5f; color: #60a5fa; }
  .type-connector { background: #1a3320; color: #4ade80; }
  .type-wiring { background: #3b1f0a; color: var(--accent2); }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: inherit;
    font-family: var(--mono);
  }

  /* ── Layout ── */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-tab {
    flex: 1;
    padding: 8px 4px;
    text-align: center;
    font-size: 10px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }

  .sidebar-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .sidebar-tab:hover:not(.active) { color: var(--text); }

  .sidebar-panel {
    display: none;
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    padding: 8px 0;
  }

  .sidebar-panel.active { display: block; }

  /* Scrollbar */
  .sidebar-panel::-webkit-scrollbar { width: 4px; }
  .sidebar-panel::-webkit-scrollbar-track { background: transparent; }
  .sidebar-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Tree ── */
  .tree-node { }

  .tree-branch {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    cursor: pointer;
    color: var(--muted);
    font-size: inherit;
    font-weight: 500;
    transition: color 0.1s, background 0.1s;
    user-select: none;
  }

  .tree-branch:hover { color: var(--text); background: rgba(255,255,255,0.03); }

  .tree-branch.open { color: var(--text); }

  .tree-chevron {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    transition: transform 0.15s;
    opacity: 0.5;
  }

  .tree-branch.open .tree-chevron { transform: rotate(90deg); }

  .tree-children {
    display: none;
    padding-left: 16px;
  }

  .tree-children.open { display: block; }

  .tree-leaf {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 12px;
    cursor: pointer;
    color: var(--muted);
    font-size: inherit;
    transition: color 0.1s, background 0.1s;
    border-left: 2px solid transparent;
  }

  .tree-leaf:hover { color: var(--text); background: rgba(255,255,255,0.03); }

  .tree-leaf.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(232,83,26,0.08);
  }

  /* ── Connector list ── */
  .connector-search-wrap {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #connector-filter {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--sans);
    font-size: inherit;
    padding: 5px 10px;
    outline: none;
  }

  #connector-filter:focus { border-color: var(--accent); }
  #connector-filter::placeholder { color: var(--muted); }

  .connector-panel-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .connector-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    padding: 4px 0;
  }

  .connector-list::-webkit-scrollbar { width: 4px; }
  .connector-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .connector-item {
    padding: 5px 12px;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }

  .connector-item:hover { background: rgba(255,255,255,0.03); }

  .connector-item.active {
    border-left-color: #4ade80;
    background: rgba(74,222,128,0.06);
  }

  .connector-name {
    font-family: var(--mono);
    font-size: inherit;
    color: var(--accent2);
  }

  .connector-desc {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Wiring list ── */
  .wiring-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }

  .wiring-item:hover { background: rgba(255,255,255,0.03); }

  .wiring-item.active {
    border-left-color: var(--accent2);
    background: rgba(245,158,11,0.06);
  }

  .wiring-type-badge {
    font-size: 8px;
    font-family: var(--mono);
    padding: 1px 4px;
    border-radius: 2px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .badge-page { background: #1f2937; color: #9ca3af; }
  .badge-connectors { background: #1a3320; color: #4ade80; }
  .badge-locindex { background: #1e1b4b; color: #a5b4fc; }

  .wiring-title {
    font-size: inherit;
    color: var(--muted);
    transition: color 0.1s;
  }

  .wiring-item:hover .wiring-title,
  .wiring-item.active .wiring-title { color: var(--text); }

  /* ── Content area ── */
  #content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  #breadcrumb {
    height: 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 6px;
    font-size: inherit;
    color: var(--muted);
    font-family: var(--mono);
    flex-shrink: 0;
    overflow: hidden;
    white-space: nowrap;
  }

  .bc-sep { opacity: 0.4; }
  .bc-item { color: var(--muted); }
  .bc-item.current { color: var(--text); }

  #zoom-controls {
    position: absolute;
    top: 8px;
    right: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    z-index: 20;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  #zoom-controls button {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 3px;
    cursor: pointer;
    padding: 0 5px;
    font-size: 14px;
    line-height: 1.4;
  }
  #zoom-controls button:hover {
    background: var(--border);
    color: var(--text);
  }
  #zoom-indicator {
    color: var(--muted);
    min-width: 36px;
    text-align: center;
    transition: opacity 0.3s;
  }

  #content-body {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* Workshop content wrapper */
  #content-frame {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: auto;
    padding: 24px 32px;
    background: #fafaf9;
    color: #1c1917;
    display: none;
  }

  #content-frame::-webkit-scrollbar { width: 6px; }
  #content-frame::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 3px; }

  /* Workshop HTML styles injected wrapper */
  .workshop-content {
    max-width: 900px;
    margin: 0 auto;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 13px;
    line-height: 1.6;
  }

  .workshop-content table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .workshop-content td, .workshop-content th { border: 1px solid #ccc; padding: 4px 8px; }
  .workshop-content h1, .workshop-content h2, .workshop-content h3 { margin: 12px 0 6px; }
  .workshop-content img { max-width: 100%; height: auto; }
  .workshop-content a { color: #1d4ed8; }

  /* SVG viewer */
  #svg-viewer {
    position: absolute;
    inset: 0;
    overflow: auto;
    display: none;
    background: #fff;
  }

  #svg-viewer svg {
    display: block;
    width: 100%;
    height: auto;
    min-width: 800px;
  }

  /* SVG page selector */
  #svg-pages {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    max-width: 200px;
    z-index: 10;
  }

  .svg-page-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 3px;
    cursor: pointer;
    background: var(--bg);
    color: var(--muted);
    border: 1px solid var(--border);
    transition: all 0.1s;
  }

  .svg-page-btn:hover { color: var(--text); }
  .svg-page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Connector viewer */
  #connector-frame {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: auto;
    display: none;
    background: #fafaf9;
    color: #1c1917;
    padding: 24px 32px;
    font-family: Arial, Helvetica, sans-serif;
  }

  #connector-frame * {
    color: inherit;
  }

  #connector-frame h2 {
    color: #1c1917;
    font-size: 16px;
    margin-bottom: 12px;
  }

  #connector-frame table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 12px;
  }

  #connector-frame td, #connector-frame th {
    border: 1px solid #999;
    padding: 4px 8px;
    color: #1c1917;
    background: inherit;
  }

  #connector-frame th { background: #ccc !important; font-weight: bold; }
  #connector-frame .pintable tr:nth-child(even) td { background: #eee !important; }
  #connector-frame svg { max-width: 500px; height: auto; cursor: zoom-in; }

  #connector-frame::-webkit-scrollbar { width: 6px; }
  #connector-frame::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 3px; }

  /* Connector file classes */
  #connector-frame .header-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
  #connector-frame .header-table th, #connector-frame .header-table td { border: 1px solid #999; padding: 4px 8px; text-align: center; }
  #connector-frame .header-table th { background: #ccc; font-weight: bold; }
  #connector-frame .face-pin-row { display: flex; gap: 16px; margin-bottom: 12px; align-items: flex-start; }
  #connector-frame .face-col { flex: 0 0 280px; }
  #connector-frame .face-col svg { width: 280px; height: auto; }
  #connector-frame .pin-col { flex: 1; }
  #connector-frame .pintable { width: 100%; border-collapse: collapse; font-size: inherit; }
  #connector-frame .pintable th { background: #ccc; border: 1px solid #999; padding: 4px 6px; text-align: center; }
  #connector-frame .pintable td { border: 1px solid #999; padding: 3px 6px; }
  #connector-frame .pintable tr:nth-child(even) td { background: #eee; }
  #connector-frame .section-label { font-weight: bold; margin: 10px 0 4px 0; font-size: 12px; }
  #connector-frame .termtable { width: 60%; border-collapse: collapse; font-size: inherit; margin-bottom: 12px; }
  #connector-frame .termtable th { background: #ccc; border: 1px solid #999; padding: 4px 6px; }
  #connector-frame .termtable td { border: 1px solid #999; padding: 3px 6px; }
  #connector-frame .pigtail-block { display: flex; gap: 12px; border: 1px solid #999; padding: 8px; margin-bottom: 8px; align-items: flex-start; }
  #connector-frame .pigtail-img { flex: 0 0 140px; }
  #connector-frame .pigtail-img img { max-width: 140px; max-height: 120px; }
  #connector-frame .pigtail-kit-header { font-weight: bold; margin-bottom: 4px; }
  #connector-frame .pigtail-info { flex: 1; font-size: inherit; line-height: 1.8; }

  /* Welcome screen */
  #welcome {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  .welcome-logo {
    font-family: var(--display);
    font-size: 48px;
    font-weight: 800;
    color: var(--border);
    letter-spacing: -0.03em;
  }

  .welcome-logo span { color: var(--accent); opacity: 0.4; }

  .welcome-sub {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
  }

  .welcome-vehicle {
    margin-bottom: 16px;
  }

  .welcome-truck {
    width: 420px;
    max-width: 90%;
    height: auto;
    border-radius: 8px;
    opacity: 0.9;
  }

  .welcome-warning {
    max-width: 480px;
    font-size: inherit;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    margin-top: 8px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(232,83,26,0.05);
  }

  .welcome-warning b {
    color: var(--accent);
  }

  /* Loading indicator */
  #loading {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  #loading.visible { display: flex; }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Resize handle */
  #resize-handle {
    width: 4px;
    background: transparent;
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  #resize-handle:hover { background: var(--accent); }

  /* ── Hide broken Ford UI images ── */
  img[src*="/content/images/workshop/CaretRight"],
  img[src*="/content/images/workshop/CaretDown"],
  img[src*="/content/images/workshop/FordEcat"],
  img[src*="/content/images/workshop/SLTS"],
  img[src*="/content/images/workshop/ShoppingCart"],
  img[src*="/content/images/workshop/fdrs"],
  img[src*="/content/images/workshop/bancircle"],
  img[src*="/content/images/workshop/maximize"],
  img[src*="/content/images/workshop/video"],
  img[src*="/content/images/workshop/videoplayer"],
  img[src*="/content/images/workshop/Help"],
  img[src*="/content/images/workshop/print"],
  img[src*="/content/images/workshop/ppt-minus"],
  img[src*="/content/images/workshop/ppt-plus"],
  img[src*="/Content/images/workshop/arrowback"],
  img[src*="/Content/images/icons-png/bars-black"],
  img[src*="/Content/images/icons-png/minus-black"] {
    display: none !important;
  }

  /* -- Workshop content theming -- */

  /* Light mode: warm parchment */
  @media (prefers-color-scheme: light) {
    #content-frame {
      background: #f5f0e8 !important;
      color: #2c2416 !important;
    }
    .workshop-content h1,
    .workshop-content h2,
    .workshop-content h3,
    .workshop-content h4 {
      color: #1a120a;
      border-bottom: 2px solid #c8a96e;
      padding-bottom: 4px;
      margin-bottom: 8px;
    }
    .workshop-content th {
      background: #e8d9b8 !important;
      border-color: #c8a96e !important;
      color: #2c2416 !important;
    }
    .workshop-content td {
      border-color: #d4c09a !important;
    }
    .workshop-content tr:nth-child(even) td {
      background: #ede7d8 !important;
    }
    .workshop-content a {
      color: #8b3a0f !important;
    }
    .workshop-content a:hover {
      color: #e8531a !important;
    }
  }

  /* Dark mode: matches sidebar */
  @media (prefers-color-scheme: dark) {
    #content-frame {
      background: #1e1e24 !important;
      color: #d4d4d8 !important;
    }
    .workshop-content {
    .workshop-svg { filter: invert(0.71); }
      color: #d4d4d8;
    }
    .workshop-content h1,
    .workshop-content h2,
    .workshop-content h3,
    .workshop-content h4 {
      color: #e4e4e7 !important;
      border-bottom: 2px solid #e8531a;
      padding-bottom: 4px;
      margin-bottom: 8px;
    }
    .workshop-content th {
      background: #2a2a32 !important;
      border-color: #3a3a44 !important;
      color: #a1a1aa !important;
    }
    .workshop-content td {
      border-color: #2a2a32 !important;
      color: #d4d4d8 !important;
    }
    .workshop-content tr:nth-child(even) td {
      background: #232329 !important;
    }
    .workshop-content a {
      color: #60a5fa !important;
    }
    .workshop-content a:hover {
      color: #93c5fd !important;
    }
    .workshop-content b,
    .workshop-content strong {
      color: #e4e4e7;
    }
    .workshop-content i,
    .workshop-content em {
      color: #a1a1aa;
    }
    .workshop-content [style*="background-color: #"] {
      background-color: #2a2a32 !important;
      color: #e4e4e7 !important;
    }
  }

  /* -- Hide Ford VIN/toolbar frame -- */
  .show-vin,
  span.show-vin {
    display: none !important;
  }

  /* ── Connector modal ── */
  #connector-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #connector-modal-overlay.visible { display: flex; }

  #connector-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    min-width: 260px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #connector-modal-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent2);
    margin-bottom: 4px;
  }

  #connector-modal-desc {
    font-size: inherit;
    color: var(--muted);
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .connector-modal-btn {
    padding: 9px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: background 0.1s, border-color 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .connector-modal-btn:hover { background: var(--border); border-color: var(--muted); }
  .connector-modal-btn .btn-icon { font-size: 14px; flex-shrink: 0; }
  .connector-modal-btn .btn-label { font-weight: 500; }
  .connector-modal-btn .btn-sub { font-size: 10px; color: var(--muted); margin-left: auto; font-family: var(--mono); }

  .connector-modal-btn {
    padding: 9px 16px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: inherit;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    text-align: left;
    transition: background 0.1s, border-color 0.1s;
  }

  .connector-modal-btn:hover { background: var(--border); }

  .connector-modal-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .connector-modal-btn.primary:hover { background: #d44a17; }

  #connector-modal-spinner {
    font-size: inherit;
    color: var(--muted);
    font-family: var(--mono);
    display: none;
  }

  @keyframes item-highlight {
    0%   { outline: 3px solid #f59e0b; outline-offset: 6px; }
    50%  { outline: 3px solid #f59e0b; outline-offset: 6px; }
    100% { outline: none; }
  }

  /* ── Color coding squares next to procedure images ── */
  .workshop-content td[bgcolor] {
    width: 20px !important;
    height: 20px !important;
    min-width: 20px !important;
    min-height: 20px !important;
    padding: 0 !important;
  }
  /* Prevent dark/light mode table rules from overriding color swatches */
  .workshop-content tr td[bgcolor],
  .workshop-content tr:nth-child(even) td[bgcolor],
  .workshop-content tr:nth-child(odd) td[bgcolor] {
    background: unset !important;
  }

  /* Connector face PNG (replaces inline SVG after conversion) */
  #connector-frame .connector-face-img {
    display: block;
    height: auto;
    max-width: 280px;
    margin-bottom: 16px;
    cursor: zoom-in;
    transition: max-width 0.2s;
  }
  #connector-frame .connector-face-img.zoomed {
    max-width: 100%;
    cursor: zoom-out;
  }
  @media (prefers-color-scheme: dark) {
    #connector-frame .connector-face-img { filter: invert(1); }
  }

  /* -- Dark mode for wiring SVG viewer -- */
  @media (prefers-color-scheme: dark) {
    #svg-viewer {
      background: #1e1e24 !important;
    }
    #connector-frame {
      background: #1e1e1e !important;
      color: #e4e4e7 !important;
    }
    #connector-frame table {
      border-color: #3a3a44 !important;
    }
    #connector-frame td, #connector-frame th {
      border-color: #3a3a44 !important;
      color: #e4e4e7 !important;
      background: #1e1e1e !important;
    }
    #connector-frame th {
      background: #2a2a32 !important;
      color: #a1a1aa !important;
    }
    #connector-frame h1, #connector-frame h2, #connector-frame h3 {
      color: #e4e4e7 !important;
      border-bottom: 2px solid #e8531a;
    }
    #connector-frame .pintable tr:nth-child(even) td,
    #connector-frame tr:nth-child(even) td {
      background: #252528 !important;
    }
    #connector-frame tr:nth-child(odd) td {
      background: #1e1e1e !important;
    }
    /* Pin circles: dark fill so they stand out on dark bg */
    #connector-frame .face-col svg circle[id^="PIN_GRAPHIC"] {
      fill: #1e1e1e !important;
      stroke: #e4e4e7 !important;
    }
  /* ── Print ── */
  @media print {
    /* Hide chrome: sidebar, header, breadcrumb, zoom, search, page nav, welcome */
    #sidebar, .resize-handle, header, #breadcrumb, #zoom-controls,
    #search-results, #svg-pages, #welcome, #loading, .page-nav { display: none !important; }

    /* Reset the fixed app layout to normal document flow */
    html, body { height: auto !important; overflow: visible !important; }
    .body { display: block !important; overflow: visible !important; }
    #content { overflow: visible !important; }
    #content-body {
      overflow: visible !important;
      position: static !important;
    }
    #content-frame, #svg-viewer, #connector-frame {
      position: static !important;
      overflow: visible !important;
      height: auto !important;
      zoom: 1 !important;
    }

    /* Force light colors for print */
    #content-frame {
      background: #fff !important;
      color: #000 !important;
    }
    #connector-frame {
      background: #fff !important;
      color: #000 !important;
    }
    #connector-frame td, #connector-frame th {
      color: #000 !important;
      background: #fff !important;
      border-color: #999 !important;
    }
    #connector-frame th {
      background: #eee !important;
    }

    /* Don't break inside these elements */
    .workshop-content img, .workshop-content table,
    .workshop-content h1, .workshop-content h2, .workshop-content h3,
    .workshop-content h4, .workshop-content h5,
    #connector-frame table, #connector-frame img,
    .workshop-svg object {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Keep headings with following content */
    .workshop-content h1, .workshop-content h2, .workshop-content h3,
    .workshop-content h4, .workshop-content h5 {
      break-after: avoid;
      page-break-after: avoid;
    }

    /* SVG wiring diagrams: reset pixel widths, fit to page */
    #svg-viewer svg {
      width: 100% !important;
      min-width: 0 !important;
      height: auto !important;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Undo dark-mode invert for print */
    .workshop-svg, .connector-face-img {
      filter: none !important;
    }

    /* Reasonable margins */
    @page { margin: 0.5in; }
  }
</style>
</head>
<body>

<!-- Header -->

  <div class="logo"><!--VEHICLE_TITLE-->Ford · Service Manual<!--/VEHICLE_TITLE--></div>

  <div class="search-wrap">

    <div id="search-results"></div>

  <div class="header-right" id="page-count">loading…</div>

<!-- Body -->
<div class="body">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" data-panel="workshop">Workshop</div>

    <div class="sidebar-panel active" id="panel-workshop">

    </div>

    <!-- Wiring panel -->
    <div class="sidebar-panel" id="panel-wiring">
      <div id="wiring-list"></div>
    </div>

    <!-- Connectors panel -->
    <div class="sidebar-panel" id="panel-connectors">
      <div class="connector-panel-inner">

          <input type="text" id="connector-filter" placeholder="Filter connectors…" autocomplete="off">
        </div>
        <div class="connector-list" id="connector-list"></div>

  <!-- Resize handle -->
  <div id="resize-handle"></div>

  <!-- Content -->
  <div id="content">
    <div id="breadcrumb"><span class="bc-item">2025 Maverick Service Manual</span></div>

    <div id="content-body">
      <div id="zoom-controls"><button onclick="contentZoom=Math.max(0.25,contentZoom-0.1);applyZoom();">−</button><span id="zoom-indicator">100%</span><button onclick="contentZoom=Math.min(4,contentZoom+0.1);applyZoom();">+</button></div>
      <div id="loading"><div class="spinner"></div></div>

      <div id="welcome">
        <div class="welcome-vehicle">
          <!--COVER_IMAGE--><img src="" alt="Vehicle" class="welcome-truck" style="display:none;"><!--/COVER_IMAGE-->
        </div>
        <div class="welcome-logo"><!--WELCOME_TITLE-->Ford · Service Manual<!--/WELCOME_TITLE--></div>
        <div class="welcome-sub">Select a section from the sidebar to begin</div>
        <div class="welcome-warning">
          ⚠️ <b>WARNING:</b> Before beginning any service procedure, refer to health and safety warnings in section 100-00 General Information.
        </div>
      </div>

      <div id="content-frame"></div>
      <div id="svg-viewer">

<!-- Connector modal -->

    <div id="connector-modal-title"></div>
    <div id="connector-modal-desc"></div>
    <button class="connector-modal-btn primary" id="connector-modal-face">View Face &amp; Pinout</button>
    <button class="connector-modal-btn" id="connector-modal-location">View Location on Vehicle</button>
    <div id="connector-modal-spinner">Searching…</div>
  </div>

<script>

// ── State ──
const state = {
  tocData: null,
  wiringToc: null,
  connectors: [],
  searchIndex: [],
  docIdIndex: {},
  pathMapping: {},
  reversePathMapping: {},
  currentSvgFiles: [],
  locationHighlight: null,
  locationHighlightOrigFill: null,
};

// ── Scroll save/restore ──
// scrollSaveEnabled lives at module scope so all functions share it cleanly.
let scrollSaveEnabled = true;

function saveCurrentScroll() {
  if (!scrollSaveEnabled) return;
  const ws = document.getElementById('content-frame').scrollTop;
  const sv = document.getElementById('svg-viewer').scrollTop;
  const cf = document.getElementById('connector-frame').scrollTop;
  history.replaceState({ ...history.state, ws, sv, cf }, '');
}

function restoreScroll(state) {
  if (!state) return;
  scrollSaveEnabled = false;
  // rAF ensures the DOM has painted before we set scrollTop
  requestAnimationFrame(() => {
    if (state.ws !== undefined) document.getElementById('content-frame').scrollTop = state.ws;
    if (state.sv !== undefined) document.getElementById('svg-viewer').scrollTop = state.sv;
    if (state.cf !== undefined) document.getElementById('connector-frame').scrollTop = state.cf;
    scrollSaveEnabled = true;
  });
}

// Attach scroll listeners once
['content-frame', 'svg-viewer', 'connector-frame'].forEach(id => {
  document.getElementById(id).addEventListener('scroll', saveCurrentScroll, { passive: true });
});

// ── popstate — back/forward navigation ──
window.addEventListener('popstate', (e) => {
  const s = e.state;
  if (!s || !s.type) return;

  if (s.type === 'workshop') {
    _loadWorkshopPage(s.path, s.breadcrumb, false).then(() => restoreScroll(s));
    highlightLeafByPath(s.path);
  } else if (s.type === 'wiring') {
    highlightWiringItem(s.cell);
    _loadSvgFolder(s.folder, s.cell, false).then(() => restoreScroll(s));
  } else if (s.type === 'connector') {
    const conn = state.connectors.find(c => c.Name === s.connName);
    if (conn) {
      highlightConnectorInList(conn.Name);
      _loadConnector(conn, false).then(() => restoreScroll(s));
    }
  }
});

// ── Path helpers ──
function encodePath(p) {
  return p.split('/').map(encodeURIComponent).join('/');
}

// ── Init ──
async function init() {
  try {
    const [tocResp, wiringResp, connResp, mappingResp] = await Promise.all([
      fetch('toc.json'),
      fetch('Wiring/toc.json'),
      fetch('Wiring/Connector Views/connectors.json'),
      fetch('path_mapping.json'),
    ]);
    state.tocData    = tocResp.ok ? await tocResp.json() : {};
    state.wiringToc  = wiringResp.ok ? await wiringResp.json() : [];
    state.connectors = connResp.ok ? await connResp.json() : [];
    state.pathMapping = mappingResp.ok ? await mappingResp.json() : {};
    buildReversePathMapping();

    buildDocIdIndex();
    buildWorkshopTree();
    buildWiringList();
    buildConnectorList();
    buildSearchIndex();

    document.getElementById('page-count').textContent =
      `${state.searchIndex.length} pages indexed`;

    // Restore from hash on initial load
    restoreFromHash();
  } catch (e) {
    console.error('Init error:', e);
    document.getElementById('page-count').textContent = 'error loading index';
  }
}

// ── Path mapping ──
function resolvePath(oldPath) {
  return state.pathMapping[oldPath] || oldPath;
}

// Reverse mapping: shortened path → original path (built at init)
function buildReversePathMapping() {
  state.reversePathMapping = {};
  for (const [original, shortened] of Object.entries(state.pathMapping)) {
    if (original !== shortened) {
      state.reversePathMapping[shortened] = original;
    }
  }
}

// Given a resolved (possibly shortened) path, produce pretty breadcrumb string
function prettyBreadcrumb(resolvedPath) {
  const original = state.reversePathMapping[resolvedPath] || resolvedPath;
  return original.replace(/\.html$/, '').replace(/\//g, ' › ');
}


// ── DocID index ──
function buildDocIdIndex() {
  function collect(node, pathParts) {
    for (const [key, value] of Object.entries(node)) {
      if (typeof value === 'string' && value.match(/^G\d+/)) {
        const filePath = resolvePath([...pathParts, key + '.html'].join('/'));
        state.docIdIndex[value] = filePath;
      } else if (typeof value === 'object') {
        collect(value, [...pathParts, key]);
      }
    }
  }
  collect(state.tocData, []);
  console.log('DocID index built:', Object.keys(state.docIdIndex).length, 'entries');
}

// ── Workshop tree ──
function buildWorkshopTree() {
  const container = document.getElementById('workshop-tree');
  container.innerHTML = '';
  renderTree(state.tocData, container, []);
}

function renderTree(node, container, pathParts) {
  for (const [key, value] of Object.entries(node)) {
    const div = document.createElement('div');
    div.className = 'tree-node';

    if (typeof value === 'string') {
      const leaf = document.createElement('div');
      leaf.className = 'tree-leaf';
      leaf.textContent = key;
      leaf.title = key;
      leaf.dataset.path = resolvePath((value && value.includes('/')) ? value : [...pathParts, key + '.html'].join('/'));
      leaf.dataset.breadcrumb = [...pathParts, key].join(' › ');
      leaf.addEventListener('click', () => loadWorkshopPage(leaf));
      div.appendChild(leaf);
    } else {
      const branch = document.createElement('div');
      branch.className = 'tree-branch';
      branch.innerHTML = `
        <svg class="tree-chevron" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="4,2 8,6 4,10"/>
        </svg>
        <span>${key}</span>`;

      const children = document.createElement('div');
      children.className = 'tree-children';

      branch.addEventListener('click', () => {
        branch.classList.toggle('open');
        children.classList.toggle('open');
      });

      renderTree(value, children, [...pathParts, key]);
      div.appendChild(branch);
      div.appendChild(children);
    }

    container.appendChild(div);
  }
}

// ── Wiring list ──
function buildWiringList() {
  const container = document.getElementById('wiring-list');
  container.innerHTML = '';

  for (const entry of state.wiringToc) {
    const item = document.createElement('div');
    item.className = 'wiring-item';
    item.dataset.cell = entry.Number;

    const badgeClass = {
      'Page': 'badge-page',
      'Connectors': 'badge-connectors',
      'LocIndex': 'badge-locindex',
    }[entry.Type] || 'badge-page';

    item.innerHTML = `<span class="wiring-title">${entry.Title}</span>`;

    item.addEventListener('click', () => loadWiringSection(entry));
    container.appendChild(item);
  }
}

// ── Connector list ──
function buildConnectorList() {
  renderConnectorList(state.connectors);

  document.getElementById('connector-filter').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    const filtered = state.connectors.filter(c =>
      c.Name.toLowerCase().includes(q) ||
      (c.Desc || '').toLowerCase().includes(q)
    );
    renderConnectorList(filtered);
  });
}

function renderConnectorList(connectors) {
  const container = document.getElementById('connector-list');
  container.innerHTML = '';
  for (const conn of connectors) {
    const item = document.createElement('div');
    item.className = 'connector-item';
    item.innerHTML = `
      <div class="connector-name">${conn.Name}</div>
      <div class="connector-desc">${conn.Desc || ''}</div>`;
    item.addEventListener('click', () => loadConnector(conn));
    container.appendChild(item);
  }
}

// ── Search index ──
function buildSearchIndex() {
  function indexNode(node, pathParts) {
    for (const [key, value] of Object.entries(node)) {
      if (typeof value === 'string') {
        state.searchIndex.push({
          type: 'workshop',
          title: key,
          path: [...pathParts, key + '.html'].join('/'),
          breadcrumb: [...pathParts, key].join(' › '),
          keywords: key.toLowerCase(),
        });
      } else {
        indexNode(value, [...pathParts, key]);
      }
    }
  }
  indexNode(state.tocData, []);

  for (const conn of state.connectors) {
    state.searchIndex.push({
      type: 'connector',
      title: `${conn.Name} — ${conn.Desc || ''}`,
      breadcrumb: `Wiring › Connector Views › ${conn.Name}`,
      keywords: `${conn.Name} ${conn.Desc || ''}`.toLowerCase(),
      conn,
    });
  }

  for (const entry of state.wiringToc) {
    state.searchIndex.push({
      type: 'wiring',
      title: entry.Title,
      breadcrumb: `Wiring › ${entry.Title}`,
      keywords: entry.Title.toLowerCase(),
      wiringEntry: entry,
    });
  }
}

// ── Search UI ──
const searchInput = document.getElementById('search');
const searchResultsEl = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) { searchResultsEl.classList.remove('visible'); return; }

  const matches = state.searchIndex.filter(item => item.keywords.includes(q)).slice(0, 30);

  searchResultsEl.innerHTML = '';
  if (!matches.length) {
    searchResultsEl.innerHTML = '<div class="search-result"><div class="result-title" style="color:var(--muted)">No results</div></div>';
  } else {
    for (const m of matches) {
      const el = document.createElement('div');
      el.className = 'search-result';
      const typeLabel = { workshop: 'Workshop', connector: 'Connector', wiring: 'Wiring' }[m.type];
      const typeClass  = { workshop: 'type-workshop', connector: 'type-connector', wiring: 'type-wiring' }[m.type];
      el.innerHTML = `
        <div class="result-title">
          <span class="result-type ${typeClass}">${typeLabel}</span>${m.title}
        </div>
        <div class="result-path">${m.breadcrumb}</div>`;
      el.addEventListener('click', () => {
        searchResultsEl.classList.remove('visible');
        searchInput.value = '';
        if (m.type === 'workshop') {
          loadWorkshopPage({ dataset: { path: m.path, breadcrumb: m.breadcrumb } });
        } else if (m.type === 'connector') {
          switchTab('connectors');
          loadConnector(m.conn);
        } else if (m.type === 'wiring') {
          switchTab('wiring');
          loadWiringSection(m.wiringEntry);
        }
      });
      searchResultsEl.appendChild(el);
    }
  }
  searchResultsEl.classList.add('visible');
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrap')) searchResultsEl.classList.remove('visible');
});

// ── Tab switching ──
document.querySelectorAll('.sidebar-tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.panel));
});

function switchTab(panel) {
  document.querySelectorAll('.sidebar-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.panel === panel));
  document.querySelectorAll('.sidebar-panel').forEach(p =>
    p.classList.toggle('active', p.id === `panel-${panel}`));
}

// ── UI helpers ──
function showLoading() { document.getElementById('loading').classList.add('visible'); }
function hideLoading() { document.getElementById('loading').classList.remove('visible'); }

function hideAll() {
  document.getElementById('welcome').style.display        = 'none';
  document.getElementById('content-frame').style.display  = 'none';
  document.getElementById('svg-viewer').style.display     = 'none';
  document.getElementById('connector-frame').style.display = 'none';
}

function setBreadcrumb(parts) {
  const bc = document.getElementById('breadcrumb');
  bc.textContent = '';

  parts.forEach((p, i) => {
    const item = document.createElement('span');
    item.className = `bc-item ${i === parts.length - 1 ? 'current' : ''}`;
    item.textContent = p;
    bc.appendChild(item);

    if (i < parts.length - 1) {
      const sep = document.createElement('span');
      sep.className = 'bc-sep';
      sep.textContent = ' › ';
      bc.appendChild(sep);
    }
  });
}

// ── Sidebar highlight helpers ──
function highlightLeafByPath(path) {
  document.querySelectorAll('.tree-leaf').forEach(leaf => {
    leaf.classList.toggle('active', leaf.dataset.path === path);
  });
}

function highlightWiringItem(cell) {
  const cellStr = String(cell).padStart(3, '0');
  document.querySelectorAll('.wiring-item').forEach(item => {
    const active = item.dataset.cell === cellStr;
    item.classList.toggle('active', active);
    if (active) item.scrollIntoView({ block: 'nearest' });
  });
}

function highlightConnectorInList(name) {
  document.querySelectorAll('.connector-item').forEach(item => {
    const nameEl = item.querySelector('.connector-name');
    const active = nameEl && nameEl.textContent === name;
    item.classList.toggle('active', active);
    if (active) item.scrollIntoView({ block: 'nearest' });
  });
}

// ── Workshop page loader ──
// Public entry point — called by sidebar clicks, search, cross-links
function loadWorkshopPage(leaf) {
  const path       = leaf.dataset.path;
  const breadcrumb = leaf.dataset.breadcrumb;
  saveCurrentScroll();
  history.pushState({ type: 'workshop', path, breadcrumb, ws: 0, sv: 0, cf: 0 }, '',
    '#' + encodeURIComponent(path));
  highlightLeafByPath(path);
  return _loadWorkshopPage(path, breadcrumb, true);
}

// Internal — does the actual fetch/render, no history mutation
async function _loadWorkshopPage(path, breadcrumb, openBranches) {
  path = resolvePath(path);
  setBreadcrumb((breadcrumb || path).split(' › '));
  showLoading();
  try {
    if (path.endsWith('.pdf')) {
      hideAll();
      const frame = document.getElementById('content-frame');
      frame.style.display = 'block';
      frame.innerHTML = `<iframe src="${encodePath(path)}" style="width:100%;height:100%;border:none;position:absolute;inset:0;"></iframe>`;
      hideLoading();
      return;
    }
    const resp = await fetch(encodePath(path));
    let html = await resp.text();
    const pageFolder = path.split('/').slice(0, -1).join('/');
    if (pageFolder) {
      html = html.replace(/src="(?!http|\/|data:)([^"]+)"/g, (m, p1) => `src="${pageFolder}/${p1}"`);
      html = html.replace(/data="(?!http|\/|data:)([^"]+\.svg)"/g, (m, p1) => `data="${pageFolder}/${p1}"`);
    }
    hideAll();
    const frame = document.getElementById('content-frame');
    frame.style.display = 'block';
    frame.innerHTML = `<div class="workshop-content">${html}</div>`;
    rewriteConnectorLinks(frame);
    makeCollapsible(frame);
    rewriteVideos(frame);

    // On forward nav, expand tree branches to reveal the active leaf
    if (openBranches) expandTreeToPath(path);
  } catch (e) {
    hideAll();
    const frame = document.getElementById('content-frame');
    frame.style.display = 'block';
    frame.innerHTML = '';
    const errorWrapper = document.createElement('div');
    errorWrapper.className = 'workshop-content';
    const errorText = document.createElement('p');
    errorText.style.color = 'red';
    errorText.textContent = `Error loading: ${path}`;
    errorWrapper.appendChild(errorText);
    frame.appendChild(errorWrapper);
  }
  hideLoading();
}

// Walk tree DOM and open branches that contain the active leaf
function expandTreeToPath(path) {
  document.querySelectorAll('.tree-leaf').forEach(leaf => {
    if (leaf.dataset.path !== path) return;
    let node = leaf.parentElement;
    while (node && node.id !== 'workshop-tree') {
      if (node.classList.contains('tree-children')) {
        node.classList.add('open');
        const branch = node.previousElementSibling;
        if (branch && branch.classList.contains('tree-branch')) branch.classList.add('open');
      }
      node = node.parentElement;
    }
  });
}

function loadWiringSection(entry) {

// Internal SVG folder loader
async function _loadSvgFolder(folder, cellNumber, freshLoad) {
  showLoading();
  try {
    const resp = await fetch(encodePath(folder) + 'pageList.json');
    const pageList = await resp.json();

    hideAll();
    const viewer = document.getElementById('svg-viewer');
    viewer.style.display = 'block';
    document.getElementById('svg-pages').innerHTML = '';
    const svgContent = document.getElementById('svg-content');
    svgContent.innerHTML = '';

    const svgFiles = pageList
      .filter(p => p && p.cell && p.page)
      .map(p => ({ label: `${p.cell}_${p.page}`, filename: `${p.cell}_${p.page}.svg` }));

    state.currentSvgFiles = svgFiles;

    for (const f of svgFiles) {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'border-bottom:1px solid #ddd;margin-bottom:8px;';
      svgContent.appendChild(wrapper);
      await loadSvgFile(folder, f.filename, wrapper);
    }
  } catch (e) {
    console.error('Error loading SVG folder:', folder, e);
  }
  hideLoading();
}

async function loadSvgFile(folder, filename, container) {
  const url = encodePath(folder) + encodeURIComponent(filename);
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    let svgText = await resp.text();
    if (!svgText.includes('xmlns="http://www.w3.org/2000/svg"')) {
      svgText = svgText.replace('<svg ', '<svg xmlns="http://www.w3.org/2000/svg" ');
    }
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgText, 'image/svg+xml');
    const svgEl = doc.querySelector('svg');
    if (!svgEl || doc.querySelector('parsererror')) throw new Error('SVG parse failed');
    svgEl.removeAttribute('width');
    svgEl.removeAttribute('height');
    svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    svgEl.style.cssText = 'width:100%;height:auto;display:block;';
    const vb = svgEl.getAttribute('viewBox');
    if (vb) {
      const parts = vb.trim().split(/[\s,]+/);
      if (parts.length === 4) {
        const w = parseFloat(parts[2]), h = parseFloat(parts[3]);
        if (w > 0 && h > 0) svgEl.style.aspectRatio = w + ' / ' + h;
      }
    }
    container.innerHTML = '';
    container.appendChild(svgEl);

    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      svgEl.querySelectorAll('[fill="rgb(243,243,243)"]').forEach(el => el.setAttribute('fill', '#2a2a2a'));
      svgEl.querySelectorAll('text[fill="black"], text[fill="Black"]').forEach(el => el.setAttribute('fill', 'white'));
      svgEl.querySelectorAll('[stroke="black"],[stroke="Black"]').forEach(el => {
        if (!el.closest('g[id^="CIRC_"]')) el.setAttribute('stroke', '#888888');
      });
    }

    rewriteSvgConnectorLinks(container);
  } catch (e) {
    container.innerHTML = '<p style="padding:20px;color:#999">Could not load: ' + filename + ' (' + e.message + ')</p>';
  }
}

// ── Connector loader ──
function loadConnector(conn) {
  const filename = buildConnectorFilename(conn);
  const path = `Wiring/Connector Views/${filename}`;
  setBreadcrumb(['Wiring', 'Connector Views', conn.Name]);
  saveCurrentScroll();
  history.pushState({ type: 'connector', connName: conn.Name, path, ws: 0, sv: 0, cf: 0 }, '',
    '#' + encodeURIComponent(path));
  highlightConnectorInList(conn.Name);
  return _loadConnector(conn, true);
}

async function _loadConnector(conn, freshLoad) {
  const filename = buildConnectorFilename(conn);
  const path = `Wiring/Connector Views/${filename}`;
  showLoading();
  try {
    const resp = await fetch(encodePath(path));
    let html = await resp.text();
    // Rewrite relative src paths (e.g. faces/xxx.png)
    const connFolder = 'Wiring/Connector Views';
    html = html.replace(/src="(?!http|\/|data:)([^"]+)"/g, (m, p1) => `src="${connFolder}/${p1}"`);
    hideAll();
    const frame = document.getElementById('connector-frame');
    frame.style.display = 'block';
    frame.innerHTML = html;

    frame.querySelectorAll('[onmouseover], [onmouseout]').forEach(el => {
      el.removeAttribute('onmouseover');
      el.removeAttribute('onmouseout');
    });

    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      frame.querySelectorAll('svg [stroke="black"]').forEach(el => el.setAttribute('stroke', 'white'));
      frame.querySelectorAll('svg [stroke="#020202"]').forEach(el => el.setAttribute('stroke', 'white'));
      frame.querySelectorAll('svg [stroke="#aaaaaa"]').forEach(el => el.setAttribute('stroke', '#888888'));
      frame.querySelectorAll('svg [stroke="Black"]').forEach(el => el.setAttribute('stroke', 'white'));
      frame.querySelectorAll('svg [fill="black"]').forEach(el => el.setAttribute('fill', 'white'));
      frame.querySelectorAll('svg [fill="Black"]').forEach(el => el.setAttribute('fill', 'white'));
      frame.querySelectorAll('svg [fill="rgb(243,243,243)"]').forEach(el => el.setAttribute('fill', '#2a2a2a'));
      frame.querySelectorAll('svg text:not([fill])').forEach(el => el.setAttribute('fill', 'white'));
    }

    // Click to zoom connector face PNG
    frame.querySelectorAll('.connector-face-img').forEach(img => {
      img.addEventListener('click', () => img.classList.toggle('zoomed'));
    });

    frame.querySelectorAll('.face-pin-row').forEach(row => { row.style.flexDirection = 'column'; });
    frame.querySelectorAll('svg').forEach(svg => {
      svg.removeAttribute('width');
      svg.removeAttribute('height');
      svg.style.width = '100%';
      svg.style.maxWidth = '100%';
      svg.style.display = 'block';
      svg.style.marginBottom = '16px';
      svg.style.cursor = 'zoom-in';
      svg.style.transition = 'height 0.2s';
      const vb = svg.getAttribute('viewBox');
      if (vb) {
        const parts = vb.trim().split(/[\s,]+/);
        if (parts.length === 4) {
          const naturalW = parseFloat(parts[2]);
          const naturalH = parseFloat(parts[3]);
          svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
          const wrapper = document.createElement('div');
          wrapper.style.cssText = 'width:100%;position:relative;';
          svg.parentNode.insertBefore(wrapper, svg);
          wrapper.appendChild(svg);
          let zoomed = false;
          requestAnimationFrame(() => {
            const w = wrapper.getBoundingClientRect().width;
            const naturalRender = w * (naturalH / naturalW);
            svg.style.height = naturalRender + 'px';
            svg.addEventListener('click', () => {
              zoomed = !zoomed;
              svg.style.height = zoomed ? (naturalRender * 2) + 'px' : naturalRender + 'px';
              svg.style.cursor = zoomed ? 'zoom-out' : 'zoom-in';
            });
          });
        }
      }
    });
  } catch (e) {
    console.error('Error loading connector:', e);
  }
  hideLoading();
}

function buildConnectorFilename(conn) {
  const desc = conn.Desc || conn.Name || '';
  const name = conn.Name;
  let title = `${sanitizeName(desc)} - ${name}`;
  if (title.length > 200) title = `${title.slice(0, 150)} (truncated) - ${name}`;
  return title + '.html';
}

function sanitizeName(name) {
  return (name || '').replace(/[–/]/g, '-').slice(0, 200);
}

// ── Initial load from hash ──
function restoreFromHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  const path = decodeURIComponent(hash);
  const savedState = history.state;

  if (path.startsWith('wiring:')) {
    const cell = path.split(':')[1].padStart(3, '0');
    const entry = state.wiringToc && state.wiringToc.find(e => e.Number === cell);
    if (!entry) return;
    switchTab('wiring');
    highlightWiringItem(cell);
    const folder = `Wiring/${entry.Title.replace(/\//g, '-')}/`;
    _loadSvgFolder(folder, cell, false).then(() => restoreScroll(savedState));

  } else if (path.includes('Connector Views')) {
    const filename = path.split('/').pop();
    const conn = state.connectors.find(c => buildConnectorFilename(c) === filename);
    if (!conn) return;
    switchTab('connectors');
    highlightConnectorInList(conn.Name);
    _loadConnector(conn, false).then(() => restoreScroll(savedState));

  } else {
    const breadcrumb = prettyBreadcrumb(path);
    highlightLeafByPath(path);
    expandTreeToPath(path);
    _loadWorkshopPage(path, breadcrumb, false).then(() => restoreScroll(savedState));
  }
}

// ── Connector cross-links (workshop HTML) ──
function rewriteConnectorLinks(container) {
  const connectorMap = {};
  state.connectors.forEach(c => connectorMap[c.Name] = c);

  // data-for docID links
  container.querySelectorAll('[data-for]').forEach(el => {
    const docId = el.getAttribute('data-for');
    if (!docId) return;
    el.removeAttribute('onclick');
    const path = state.docIdIndex[docId];
    if (path) {
      el.style.cursor = 'pointer';
      el.style.color = '#1d4ed8';
      el.style.textDecoration = 'underline';
      el.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        loadWorkshopPage({ dataset: { path, breadcrumb: prettyBreadcrumb(path) } });
      });
    } else {
      el.removeAttribute('onclick');
    }
  });

  // Strip remaining Ford onclick handlers
  container.querySelectorAll('[onclick]').forEach(el => {
    const oc = el.getAttribute('onclick') || '';
    if (oc.includes('Pinpoint') || oc.includes('load_sgmlid') ||
        oc.includes('partlink')  || oc.includes('clickPpt')) {
      el.removeAttribute('onclick');
    }
  });

  // href="#G..." anchor links
  container.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href') || '';
    if (href.startsWith('#G') || href.startsWith('#g')) {
      const docId = href.slice(1).split('p')[0];
      const anchor = container.querySelector(`a[name^="${docId}"]`);
      if (anchor) {
        a.style.color = '#1d4ed8';
        a.addEventListener('click', (e) => {
          e.preventDefault();
          anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      } else {
        const path = state.docIdIndex[docId];
        if (path) {
          a.style.color = '#1d4ed8';
          a.addEventListener('click', (e) => {
            e.preventDefault();
            loadWorkshopPage({ dataset: { path, breadcrumb: prettyBreadcrumb(path) } });
          });
        } else {
          a.addEventListener('click', (e) => e.preventDefault());
        }
      }
      return;
    }
    if (href.startsWith('javascript:') || href.startsWith('data:') || href.startsWith('vbscript:') || href === '#') {
      a.addEventListener('click', (e) => e.preventDefault());
    }
  });

  // publication-content / data-searchnum / data-procuid links
  container.querySelectorAll('a.publication-content, [data-searchnum], [data-procuid][data-callfrom="procedure"]').forEach(el => {
    const docId = el.getAttribute('data-searchnum') || el.getAttribute('data-procuid') || el.getAttribute('data-for');
    if (!docId) return;
    el.removeAttribute('onclick');
    const path = state.docIdIndex[docId];
    if (path) {
      el.style.cursor = 'pointer';
      el.style.color = '#1d4ed8';
      el.style.textDecoration = 'underline';
      el.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        loadWorkshopPage({ dataset: { path, breadcrumb: prettyBreadcrumb(path) } });
      });
    } else {
      el.style.color = '#9ca3af';
      el.style.cursor = 'not-allowed';
      el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); });
    }
  });

  // data-for + data-show-ppt (DTC pinpoint links)
  container.querySelectorAll('[data-for][data-show-ppt]').forEach(el => {
    const docId = el.getAttribute('data-for');
    if (!docId) return;
    el.removeAttribute('onclick');
    const path = state.docIdIndex[docId];
    if (path) {
      el.style.cursor = 'pointer';
      el.style.color = '#1d4ed8';
      el.style.textDecoration = 'underline';
      el.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        loadWorkshopPage({ dataset: { path, breadcrumb: prettyBreadcrumb(path) } });
      });
    } else {
      el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); });
    }
  });

  // <a> tags with connector names
  container.querySelectorAll('a').forEach(a => {
    const text = a.textContent.trim();
    if (connectorMap[text]) {
      a.style.cursor = 'pointer';
      a.style.color = '#16a34a';
      a.href = '#';
      a.addEventListener('click', (e) => {
        e.preventDefault();
        switchTab('connectors');
        loadConnector(connectorMap[text]);
      });
    }
  });
}

// ── Connector modal ──
function rewriteSvgConnectorLinks(container) {
  const connectorMap = {};
  state.connectors.forEach(c => connectorMap[c.Name] = c);

  container.querySelectorAll('[faceview]').forEach(el => {
    const conn = state.connectors.find(c => c.FaceView === el.getAttribute('faceview'));
    if (conn) {
      el.style.cursor = 'pointer';
      el.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        switchTab('connectors');
        loadConnector(conn);
      });
    }
  });

  container.querySelectorAll('text[fill="blue"]').forEach(el => {
    const text = el.textContent.trim();
    if (connectorMap[text]) {
      el.style.cursor = 'pointer';
      el.setAttribute('fill', '#16a34a');
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        showConnectorModal(connectorMap[text]);
      });
    } else {
      el.setAttribute('fill', '#60a5fa');
    }
  });

  // PAGEREF links (e.g. id="PAGEREF_151-19") — module/component location references
  container.querySelectorAll('[id^="PAGEREF_"]').forEach(el => {
    const match = el.id.match(/^PAGEREF_(\d+)-(\d+)$/);
    if (!match) return;
    const cell    = match[1].padStart(3, '0');
    const pageNum = parseInt(match[2]);
    const entry   = state.wiringToc && state.wiringToc.find(e => e.Number === cell);
    if (!entry) return;

    // Strip Ford onclick
    el.querySelectorAll('[onclick]').forEach(t => t.removeAttribute('onclick'));
    el.style.cursor = 'pointer';

    el.addEventListener('click', async (e) => {
      e.preventDefault(); e.stopPropagation();
      const pageRef = el.id;
      await navigateToWiringPage(entry, cell, pageNum);
      // After load, poll for and highlight the PAGEREF element
      const viewer = document.getElementById('svg-viewer');
      const pollPageRef = (attempts = 0) => {
        const target = viewer.querySelector(`#${CSS.escape(pageRef)}`);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          const textEl = target.querySelector('text');
          if (textEl) {
            if (state.locationHighlight) {
              state.locationHighlight.setAttribute('fill', state.locationHighlightOrigFill || '#60a5fa');
            }
            state.locationHighlight = textEl;
            state.locationHighlightOrigFill = textEl.getAttribute('fill') || '#60a5fa';
            textEl.setAttribute('fill', '#e8531a');
          }
        } else if (attempts < 20) {
          setTimeout(() => pollPageRef(attempts + 1), 100);
        }
      };
      pollPageRef();
    });
  });

  // Suppress standalone PAGEREF handler when inside a dialog_ group
  // (dialog_ handler below will manage those PAGEREFs via modal)
  container.querySelectorAll('[id^="PAGEREF_"]').forEach(el => {
    if (el.closest('[id^="dialog_"]')) {
      el.querySelectorAll('[onclick]').forEach(t => t.removeAttribute('onclick'));
    }
  });

  // dialog_ groups — unified handler for grounds, splices, and other named components
  // These contain the component symbol + optional PAGEREF child
  container.querySelectorAll('[id^="dialog_"]').forEach(el => {
    const name = el.getAttribute('name') || el.id.replace('dialog_', '');
    if (!name) return;

    // Find PAGEREF child if present
    const pagerefEl = el.querySelector('[id^="PAGEREF_"]');
    let wiringCell = null, wiringPageNum = null, wiringEntry = null;
    if (pagerefEl) {
      const m = pagerefEl.id.match(/^PAGEREF_(\d+)-(\d+)$/);
      if (m) {
        wiringCell    = m[1].padStart(3, '0');
        wiringPageNum = parseInt(m[2]);
        wiringEntry   = state.wiringToc && state.wiringToc.find(e => e.Number === wiringCell);
      }
    }

    // Strip Ford onclicks
    el.querySelectorAll('[onclick]').forEach(t => t.removeAttribute('onclick'));
    el.style.cursor = 'pointer';

    el.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      showComponentModal(name, wiringEntry, wiringCell, wiringPageNum);
    });
  });

  // Splice points not inside a dialog_ wrapper (fallback)
  container.querySelectorAll('[id^="SPLICE_"]').forEach(el => {
    if (el.closest('[id^="dialog_"]')) return; // handled by dialog_ above
    const match = el.id.match(/^SPLICE_([^~]+)~INDEX~/);
    if (!match) return;
    const name = match[1];
    el.querySelectorAll('[onclick]').forEach(t => t.removeAttribute('onclick'));
    el.style.cursor = 'pointer';
    el.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      loadItemLocation(name);
    });
  });

  // Ground/other DATA elements not inside a dialog_ wrapper (fallback)
  container.querySelectorAll('[id*="~DATA~"],[id*="~INDEX~"]').forEach(el => {
    if (el.closest('[id^="dialog_"]')) return;
    const match = el.id.match(/^[A-Z]+_([^~]+)~(?:DATA|INDEX)~/);
    if (!match) return;
    const name = match[1];
    el.querySelectorAll('[onclick]').forEach(t => t.removeAttribute('onclick'));
    el.style.cursor = 'pointer';
    el.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      loadItemLocation(name);
    });
  });

  // Wiring cross-page links (cell=XX&page=XX)
  const xlinkNS = 'http://www.w3.org/1999/xlink';
  container.querySelectorAll('a').forEach(el => {
    const href = el.getAttributeNS(xlinkNS, 'href') || el.getAttribute('href') || '';
    if (!href.includes('cell=')) return;
    const cellMatch = href.match(/cell=(\d+)/);
    const pageMatch = href.match(/page=(\d+)/);
    if (!cellMatch || !pageMatch) return;
    const cell  = cellMatch[1].padStart(3, '0');
    const page  = parseInt(pageMatch[1]);
    const entry = state.wiringToc && state.wiringToc.find(e => e.Number === cell);
    if (!entry) return;
    el.removeAttributeNS(xlinkNS, 'href');
    el.removeAttribute('href');
    el.style.cursor = 'pointer';
    el.addEventListener('click', async (e) => {
      e.preventDefault(); e.stopPropagation();
      const folder = `Wiring/${entry.Title}/`;
      switchTab('wiring');
      saveCurrentScroll();
      history.pushState({ type: 'wiring', folder, cell, ws: 0, sv: 0, cf: 0 }, '',
        '#' + encodeURIComponent('wiring:' + cell));
      highlightWiringItem(cell);
      await _loadSvgFolder(folder, cell, true);
      const target = document.querySelector(`#svg-content > div:nth-child(${page})`);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

// ── Collapsible sections ──
function makeCollapsible(container) {
  // ── Fix bgcolor color swatches — copy to inline style so dark mode can't override ──
  container.querySelectorAll('td[bgcolor]').forEach(td => {
    td.style.setProperty('background-color', td.getAttribute('bgcolor'), 'important');
  });

  // DTC chart modules
  container.querySelectorAll('[id^="SpanDtc"]').forEach(span => {
    const div = container.querySelector(`#DivDtc${span.id.replace('SpanDtc', '')}`);
    if (!div) return;
    div.style.display = 'none';
    const btn = document.createElement('span');
    btn.textContent = '▶ ';
    btn.style.cssText = 'cursor:pointer;font-size:11px;user-select:none;display:block;';
    span.removeAttribute('onclick');
    span.style.cursor = 'pointer';
    const toggle = () => {
      const open = div.style.display !== 'none';
      div.style.display = open ? 'none' : 'block';
      btn.textContent = open ? '▶ ' : '▼ ';
    };
    btn.addEventListener('click', toggle);
    span.addEventListener('click', toggle);
    span.parentNode.insertBefore(btn, span);
    span.querySelectorAll('img').forEach(img => img.style.display = 'none');
  });

  // Pinpoint tests
  const ppLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  container.querySelectorAll(ppLetters.map(l => `[id^="Span${l}"]`).join(',')).forEach(span => {
    if (!span.classList.contains('isipppt')) return;
    const div = container.querySelector(`#PPT${span.id.replace('Span', '')}`);
    if (!div) return;
    div.style.display = 'none';
    const btn = document.createElement('span');
    btn.textContent = '▶ ';
    btn.style.cssText = 'cursor:pointer;font-size:11px;user-select:none;margin-right:4px;';
    span.removeAttribute('onclick');
    span.style.cursor = 'pointer';
    const toggle = () => {
      const open = div.style.display !== 'none';
      div.style.display = open ? 'none' : 'block';
      btn.textContent = open ? '▶ ' : '▼ ';
    };
    btn.addEventListener('click', toggle);
    span.addEventListener('click', toggle);
    span.parentNode.insertBefore(btn, span);
    span.querySelectorAll('img').forEach(img => img.style.display = 'none');
  });

  // Hide hamburger buttons
  container.querySelectorAll('[id="linkShowAllSteps"], [id="linkShowSingleStep"]').forEach(el => {
    el.style.display = 'none';
  });

  // Print button
  container.querySelectorAll('[id="pptPrint"]').forEach(el => {
    const btn = document.createElement('span');
    btn.textContent = '🖨';
    btn.title = 'Print';
    btn.style.cssText = 'cursor:pointer;font-size:14px;margin-left:10px;';
    btn.addEventListener('click', (e) => { e.stopPropagation(); window.print(); });
    el.parentNode.replaceChild(btn, el);
  });

  // Warning / arrowback images → emoji
  container.querySelectorAll('img').forEach(img => {
    const src = img.getAttribute('src') || '';
    let emoji = null, style = '';
    if (src.includes('/content/images/workshop/warning') || src.includes('/Content/images/workshop/warning')) {
      emoji = '⚠️'; style = 'font-size:14px;vertical-align:middle;margin:0 4px;';
    } else if (src.includes('/content/images/workshop/arrowback') || src.includes('/Content/images/workshop/arrowback')) {
      emoji = '←'; style = 'font-size:14px;vertical-align:middle;margin:0 4px;font-weight:bold;';
    } else if (src.includes('/content/images/workshop/video')) {
      emoji = '🎬'; style = 'font-size:16px;vertical-align:middle;margin:0 4px;cursor:pointer;';
    } else if (src.includes('/content/images/workshop/Help')) {
      emoji = '❓'; style = 'font-size:16px;vertical-align:middle;margin:0 4px;cursor:pointer;';
    }
    if (emoji) {
      const span = document.createElement('span');
      span.textContent = emoji;
      span.style.cssText = style;
      img.parentNode.replaceChild(span, img);
    }
  });

  // Pinpoint intro sections
  container.querySelectorAll('[id="lnkPptStepIntro"]').forEach(link => {
    const introDiv = link.parentElement?.querySelector('[data-content-type="intro"]');
    if (!introDiv) return;
    introDiv.style.display = 'none';
    link.removeAttribute('onclick');
    link.style.cursor = 'pointer';
    link.querySelectorAll('img').forEach(img => img.style.display = 'none');
    const btn = document.createElement('span');
    btn.textContent = '▶ ';
    btn.style.cssText = 'cursor:pointer;font-size:11px;user-select:none;margin-right:4px;';
    const toggle = () => {
      const open = introDiv.style.display !== 'none';
      introDiv.style.display = open ? 'none' : 'block';
      btn.textContent = open ? '▶ ' : '▼ ';
    };
    btn.addEventListener('click', toggle);
    link.addEventListener('click', (e) => { e.preventDefault(); toggle(); });
    link.parentNode.insertBefore(btn, link);
  });
}

// ── Connector choice modal ──

const modalTitle    = document.getElementById('connector-modal-title');
const modalDesc     = document.getElementById('connector-modal-desc');

const modalLocBtn   = document.getElementById('connector-modal-location');

// ── Modal functions ──
function showConnectorModal(conn) {
  modalTitle.textContent = conn.Name;
  modalDesc.textContent  = conn.Desc || '';
  modalSpinner.style.display = 'none';

  // Reset buttons to connector defaults
  modalFaceBtn.style.display = 'block';
  modalFaceBtn.textContent   = 'View Face & Pinout';
  modalLocBtn.style.display  = 'block';
  modalLocBtn.textContent    = 'View Location on Vehicle';
  modalLocBtn.disabled       = false;

  // Remove any extra wiring button
  const wiringBtn = document.getElementById('connector-modal-wiring');
  if (wiringBtn) wiringBtn.style.display = 'none';

  modalFaceBtn.onclick = () => {
    closeConnectorModal();
    switchTab('connectors');
    loadConnector(conn);
  };

  modalLocBtn.onclick = async () => {
    modalLocBtn.style.display  = 'none';
    modalFaceBtn.style.display = 'none';
    modalSpinner.style.display = 'block';
    closeConnectorModal();
    await loadConnectorLocation(conn);
    // Reset for next use
    modalFaceBtn.style.display = 'block';
    modalSpinner.style.display = 'none';
  };

  modalOverlay.classList.add('visible');
}

function showComponentModal(name, wiringEntry, wiringCell, wiringPageNum) {
  modalTitle.textContent = name;
  modalDesc.textContent  = '';
  modalSpinner.style.display = 'none';

  // No face/pinout for non-connectors
  modalFaceBtn.style.display = 'none';

  // Location button
  modalLocBtn.style.display  = 'block';
  modalLocBtn.textContent    = 'View Location on Vehicle';
  modalLocBtn.disabled       = false;
  modalLocBtn.onclick = async () => {
    closeConnectorModal();
    modalFaceBtn.style.display = 'block';
    await loadItemLocation(name);
  };

  // Wiring button — create once, reuse
  let wiringBtn = document.getElementById('connector-modal-wiring');
  if (!wiringBtn) {
    wiringBtn = document.createElement('button');
    wiringBtn.id        = 'connector-modal-wiring';
    wiringBtn.className = 'connector-modal-btn';
    modalLocBtn.after(wiringBtn);
  }

  if (wiringEntry && wiringPageNum !== null) {
    wiringBtn.style.display = 'block';
    wiringBtn.textContent   = `View in Wiring (${parseInt(wiringCell)}-${wiringPageNum})`;
    wiringBtn.onclick = async () => {
      closeConnectorModal();
      modalFaceBtn.style.display = 'block';
      await navigateToWiringPage(wiringEntry, wiringCell, wiringPageNum);
    };
  } else {
    wiringBtn.style.display = 'none';
  }

  modalOverlay.classList.add('visible');
}

function closeConnectorModal() {
  modalOverlay.classList.remove('visible');
}

// ── navigateToWiringPage ──
async function navigateToWiringPage(entry, cell, pageNum) {
  const folder = `Wiring/${entry.Title.replace(/\//g, '-')}/`;
  switchTab('wiring');
  saveCurrentScroll();
  history.pushState(
    { type: 'wiring', folder, cell, ws: 0, sv: 0, cf: 0 }, '',
    '#' + encodeURIComponent('wiring:' + cell)
  );
  highlightWiringItem(cell);

  let filename = null;
  try {
    const resp = await fetch(encodePath(folder) + 'pageList.json');
    const pageList = await resp.json();
    const svgFiles = pageList
      .filter(p => p && p.cell && p.page)
      .map(p => `${p.cell}_${p.page}.svg`);
    filename = svgFiles[pageNum - 1] || null;
  } catch (err) {
    console.error('navigateToWiringPage: could not load pageList', err);
  }
  if (!filename) return;

  showLoading();
  hideAll();
  const viewer = document.getElementById('svg-viewer');
  viewer.style.display = 'block';
  document.getElementById('svg-pages').innerHTML = '';
  const svgContent = document.getElementById('svg-content');
  svgContent.innerHTML = '';
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'border-bottom:1px solid #ddd;margin-bottom:8px;';
  svgContent.appendChild(wrapper);
  await loadSvgFile(folder, filename, wrapper);
  hideLoading();
}

// ── Shared location finder (used by both connector modal and splice clicks) ──
async function loadItemLocation(name) {
  // Clear any previous persistent highlight
  if (state.locationHighlight) {
    state.locationHighlight.setAttribute('fill', state.locationHighlightOrigFill || 'black');
    state.locationHighlight = null;
    state.locationHighlightOrigFill = null;
  }

  const locEntry = state.wiringToc && state.wiringToc.find(e => e.Number === '151');
  if (!locEntry) {
    console.warn('Component Location Views entry not found in wiring TOC');
    return;
  }

  const folder     = `Wiring/${locEntry.Title.replace(/\//g, '-')}/`;
  // Name may appear anywhere in a combined id like ITEM_S322,S323_ALL
  // Match: starts with name, or preceded by comma
  const itemExact  = `ITEM_${name}_`;   // e.g. ITEM_S222_  (sole entry)
  const itemFirst  = `ITEM_${name},`;   // e.g. ITEM_S322,  (first in combined)
  const itemCombo  = `,${name}_`;       // e.g. ,S323_      (last in combined)
  const itemCombo2 = `,${name},`;       // e.g. ,S323,      (middle in combined)

  // Fetch pageList
  let pageList;
  try {
    const resp = await fetch(encodePath(folder) + 'pageList.json');
    pageList = await resp.json();
  } catch (e) {
    console.error('Could not load pageList.json for location views', e);
    return;
  }

  const svgFiles = pageList
    .filter(p => p && p.cell && p.page)
    .map(p => ({ label: `${p.cell}_${p.page}`, filename: `${p.cell}_${p.page}.svg` }));

  // Search SVG text for the ITEM prefix
  let foundFile = null;
  for (const f of svgFiles) {
    try {
      const url  = encodePath(folder) + encodeURIComponent(f.filename);
      const resp = await fetch(url);
      if (!resp.ok) continue;
      const text = await resp.text();
      if (text.includes(`id="${itemExact}`) || text.includes(`id="${itemFirst}`) || text.includes(itemCombo) || text.includes(itemCombo2)) {
        foundFile = f;
        break;
      }
    } catch (e) {
      continue;
    }
  }

  // Push history and highlight wiring sidebar
  switchTab('wiring');
  saveCurrentScroll();
  history.pushState(
    { type: 'wiring', folder, cell: '151', ws: 0, sv: 0, cf: 0 }, '',
    '#' + encodeURIComponent('wiring:151')
  );
  highlightWiringItem('151');

  if (!foundFile) {
    // Not found — load all pages as fallback
    await _loadSvgFolder(folder, '151', true);
    return;
  }

  // Load only the matching page
  showLoading();
  hideAll();
  const viewer = document.getElementById('svg-viewer');
  viewer.style.display = 'block';
  document.getElementById('svg-pages').innerHTML = '';
  const svgContent = document.getElementById('svg-content');
  svgContent.innerHTML = '';
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'border-bottom:1px solid #ddd;margin-bottom:8px;';
  svgContent.appendChild(wrapper);
  await loadSvgFile(folder, foundFile.filename, wrapper);
  hideLoading();

  // Poll and highlight
  const highlightPoll = (attempts = 0) => {
    // Match exact (ITEM_S222_ALL) or combined (ITEM_S322,S323_ALL)
    const el     = viewer.querySelector(`[id^="${itemExact}"][id$="_ALL"], [id^="${itemFirst}"][id$="_ALL"], [id*="${itemCombo}"][id$="_ALL"], [id*="${itemCombo2}"][id$="_ALL"]`);
    const textEl = viewer.querySelector(`[id^="${itemExact}"][id$="_TEXT"], [id^="${itemFirst}"][id$="_TEXT"], [id*="${itemCombo}"][id$="_TEXT"], [id*="${itemCombo2}"][id$="_TEXT"]`);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const target = textEl || el;
      if (state.locationHighlight) {
        state.locationHighlight.setAttribute('fill', state.locationHighlightOrigFill || 'black');
      }
      state.locationHighlightOrigFill = target.getAttribute('fill') || 'black';
      target.setAttribute('fill', '#e8531a');
      state.locationHighlight = target;
    } else if (attempts < 20) {
      setTimeout(() => highlightPoll(attempts + 1), 100);
    }
  };
  highlightPoll();
}

let _onlineStatus = null;
let _onlineCheckedAt = 0;
const ONLINE_TTL = 5 * 60 * 1000; // 5 minutes

async function checkOnline() {
  const now = Date.now();
  if (_onlineStatus !== null && (now - _onlineCheckedAt) < ONLINE_TTL) {
    return _onlineStatus;
  }
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 3000);
    await fetch('https://www.google.com/generate_204', {
      method: 'GET',
      mode: 'no-cors',
      signal: ctrl.signal,
    });
    _onlineStatus = true;
  } catch (e) {
    _onlineStatus = false;
  }
  _onlineCheckedAt = Date.now();
  return _onlineStatus;
}

async function rewriteVideos(container) {
  const online = await checkOnline();
  if (online) return; // Brightcove iframes work fine online, leave them alone

  container.querySelectorAll('iframe[src*="brightcove"], iframe[src*="bcove.video"]').forEach(iframe => {
    const src   = iframe.getAttribute('src') || '';
    // Try ?videoId= param first, then BCOVE_MAP lookup
    const paramMatch = src.match(/videoId=(\d+)/);
    const videoId = paramMatch ? paramMatch[1] : (BCOVE_MAP[src] || null);

    // Find the wrapper div (Ford wraps iframes in a padding-bottom aspect ratio div)
    const wrapper = iframe.closest('div[style*="padding-bottom"]') || iframe.parentElement;

    let replacement;
    if (videoId) {
      // Replace with local video — HEAD check to confirm file exists
      fetch(`videos/${videoId}.mp4`, { method: 'HEAD' })
        .then(r => {
          if (r.ok) {
            const video = document.createElement('video');
            video.src      = `videos/${videoId}.mp4`;
            video.controls = true;
            video.style.cssText = 'width:100%;max-width:100%;display:block;margin:8px 0;border-radius:4px;background:#000;';
            replaceIframe(iframe, wrapper, video);
          } else {
            replaceIframe(iframe, wrapper, offlineMsg());
          }
        })
        .catch(() => replaceIframe(iframe, wrapper, offlineMsg()));
    } else {
      replaceIframe(iframe, wrapper, offlineMsg());
    }
  });
}

function replaceIframe(iframe, wrapper, replacement) {
  if (wrapper && wrapper !== iframe.parentElement.parentElement) {
    wrapper.style.cssText = 'margin:8px 0;';
    wrapper.innerHTML = '';
    wrapper.appendChild(replacement);
  } else {
    iframe.replaceWith(replacement);
  }
}

function offlineMsg() {
  const msg = document.createElement('div');
  msg.style.cssText = 'padding:16px;background:#f3f4f6;border-radius:4px;color:#6b7280;font-size:12px;margin:8px 0;text-align:center;';
  msg.textContent = 'Video unavailable offline';
  return msg;
}

// ── Cmd+scroll zoom on content frames ──
let contentZoom = 1;
function applyZoom() {
  ['content-frame', 'connector-frame'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.zoom = contentZoom;
  });
  // SVG wiring: set explicit pixel width on SVGs so zoom works
  document.querySelectorAll('#svg-content svg').forEach(svg => {
    const vb = svg.getAttribute('viewBox');
    if (vb) {
      const w = parseFloat(vb.split(/\s+/)[2]) || 1100;
      svg.style.width = (w * contentZoom) + 'px';
      svg.style.height = 'auto';
    }
  });
  const indicator = document.getElementById('zoom-indicator');
  if (indicator) {
    indicator.textContent = Math.round(contentZoom * 100) + '%';
    indicator.style.opacity = '1';
    clearTimeout(indicator._fade);
    indicator._fade = setTimeout(() => indicator.style.opacity = '0', 1200);
  }
}
['content-frame', 'svg-viewer', 'connector-frame'].forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('wheel', (e) => {
    if (!e.metaKey && !e.ctrlKey) return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.05 : 0.05;
    contentZoom = Math.max(0.25, Math.min(4, contentZoom + delta));
    applyZoom();
  }, { passive: false });
  el.addEventListener('wheel', (e) => {
    if (!e.altKey) return;
    e.preventDefault();
    el.scrollLeft += e.deltaY;
  }, { passive: false });
});
